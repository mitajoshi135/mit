<html>
<body>
    <script>
        function factorial(n) {
            if (n === 0 || n === 1) return 1;
            return n * factorial(n - 1);
        }
        const numbers = [1, 2, 3, 4, 5];
        const factorials = numbers.map(factorial);
        document.write(factorials);
    </script>
</body>
</html>
